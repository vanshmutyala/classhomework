# Render Infrastructure as Code
# Deploy this repo on Render to get the backend API + PostgreSQL database.
# After deploying, copy the web service URL and set it as VITE_API_URL
# in your Netlify environment variables for the frontend build.

databases:
  - name: classhomework-db
    databaseName: classhomework
    user: classhomework_user
    plan: free

services:
  - type: web
    name: classhomework-api
    env: node
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && node index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: classhomework-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGIN
        # After your Netlify site is live, update this to your actual Netlify URL.
        # Multiple origins can be comma-separated: https://site.netlify.app,https://custom-domain.com
        value: https://your-app.netlify.app
